name: ReAct — build & push images to GHCR

# Scoped to the ReAct/ subproject only.
# Triggers exclusively when ReAct files (or the shared mcp_client.py) change.

on:
  push:
    branches: [main]
    paths:
      - "ReAct/**"
      - "mcp_client_app/mcp_client.py"
      - ".github/workflows/react-build-and-push.yml"
  workflow_dispatch:
    inputs:
      vite_api_base:
        description: "Backend public URL baked into the UI bundle (e.g. https://react-pr-api.xyz.eastus.azurecontainerapps.io). Leave empty to use repo variable VITE_API_BASE."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/react-pr-api
  UI_IMAGE: ${{ github.repository_owner }}/react-pr-ui

jobs:
  build-backend:
    name: ReAct backend → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ReAct/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=react-pr-api
          cache-to: type=gha,scope=react-pr-api,mode=max

  build-ui:
    name: ReAct UI → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.UI_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Resolve VITE_API_BASE
        id: vite
        run: |
          if [ -n "${{ inputs.vite_api_base }}" ]; then
            echo "value=${{ inputs.vite_api_base }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ vars.VITE_API_BASE }}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ReAct/ui
          file: ReAct/ui/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE=${{ steps.vite.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=react-pr-ui
          cache-to: type=gha,scope=react-pr-ui,mode=max
