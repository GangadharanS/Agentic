server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static asset caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all unknown routes go to index.html.
    # The UI calls the backend at VITE_API_BASE (baked at build time),
    # so we don't proxy /api here.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
