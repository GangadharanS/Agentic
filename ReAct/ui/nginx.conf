server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unknown routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container (set BACKEND_URL via env-substitution at deploy time,
    # or replace at build time). For Azure Container Apps with internal networking,
    # use the backend's app name: http://react-pr-api.internal.<env>.azurecontainerapps.io
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream SSE without buffering for /api/review/stream
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
